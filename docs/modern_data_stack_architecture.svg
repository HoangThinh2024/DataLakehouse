<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Modern Data Stack Architecture trên WSL2</title>
  <desc>Kiến trúc hệ thống gồm 5 tầng: Ingestion, Storage, Processing, Serving và Visualization — PostgreSQL + RustFS + ClickHouse + Docker trên WSL2</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .th-blue { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts-blue { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-coral { font-size: 14px; font-weight: 500; fill: #712B13; }
      .ts-coral { font-size: 12px; font-weight: 400; fill: #993C1D; }
      .th-amber { font-size: 14px; font-weight: 500; fill: #633806; }
      .ts-amber { font-size: 12px; font-weight: 400; fill: #854F0B; }
      .th-purple { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts-purple { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .th-green { font-size: 14px; font-weight: 500; fill: #27500A; }
      .ts-green { font-size: 12px; font-weight: 400; fill: #3B6D11; }
      .th-gray { font-size: 14px; font-weight: 500; fill: #444441; }
      .ts-gray { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .layer-label { font-size: 11px; font-weight: 400; fill: #888780; }
      .divider { stroke: #D3D1C7; stroke-width: 0.5; stroke-dasharray: 4 4; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="820" fill="#ffffff"/>

  <!-- Layer labels -->
  <text class="layer-label" x="36" y="108" text-anchor="middle" transform="rotate(-90,36,108)">INGEST</text>
  <text class="layer-label" x="36" y="240" text-anchor="middle" transform="rotate(-90,36,240)">STORAGE</text>
  <text class="layer-label" x="36" y="400" text-anchor="middle" transform="rotate(-90,36,400)">PROCESS</text>
  <text class="layer-label" x="36" y="560" text-anchor="middle" transform="rotate(-90,36,560)">SERVING</text>
  <text class="layer-label" x="36" y="700" text-anchor="middle" transform="rotate(-90,36,700)">REPORT</text>

  <!-- ═══════ LAYER 1: INGESTION ═══════ -->
  <rect x="58" y="52" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="133" y="76" text-anchor="middle" dominant-baseline="central">Web App Upload</text>
  <text class="ts" x="133" y="95" text-anchor="middle" dominant-baseline="central">CSV, XLSX, JSON</text>

  <rect x="222" y="52" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="297" y="76" text-anchor="middle" dominant-baseline="central">API / Connectors</text>
  <text class="ts" x="297" y="95" text-anchor="middle" dominant-baseline="central">Airbyte / custom</text>

  <rect x="386" y="52" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="461" y="76" text-anchor="middle" dominant-baseline="central">Manual / IT tools</text>
  <text class="ts" x="461" y="95" text-anchor="middle" dominant-baseline="central">DBeaver, pgAdmin</text>

  <rect x="550" y="52" width="118" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-purple" x="609" y="76" text-anchor="middle" dominant-baseline="central">Auth / RBAC</text>
  <text class="ts-purple" x="609" y="95" text-anchor="middle" dominant-baseline="central">Keycloak / SSO</text>

  <!-- ═══════ LAYER 2: STORAGE ═══════ -->
  <line x1="50" y1="128" x2="670" y2="128" class="divider"/>

  <rect x="58" y="150" width="178" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="147" y="174" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="ts-blue" x="147" y="193" text-anchor="middle" dominant-baseline="central">OLTP · metadata · users</text>

  <rect x="252" y="150" width="176" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th-coral" x="340" y="174" text-anchor="middle" dominant-baseline="central">RustFS</text>
  <text class="ts-coral" x="340" y="193" text-anchor="middle" dominant-baseline="central">Object storage · S3-API</text>

  <rect x="444" y="150" width="178" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th-amber" x="533" y="174" text-anchor="middle" dominant-baseline="central">ClickHouse</text>
  <text class="ts-amber" x="533" y="193" text-anchor="middle" dominant-baseline="central">OLAP · analytics · DW</text>

  <!-- ═══════ LAYER 3: PROCESSING ═══════ -->
  <line x1="50" y1="226" x2="670" y2="226" class="divider"/>

  <rect x="58" y="258" width="188" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-purple" x="152" y="282" text-anchor="middle" dominant-baseline="central">Mage.ai (Pipeline)</text>
  <text class="ts-purple" x="152" y="301" text-anchor="middle" dominant-baseline="central">ETL · data cleaning</text>

  <rect x="262" y="258" width="156" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-purple" x="340" y="282" text-anchor="middle" dominant-baseline="central">dbt Core</text>
  <text class="ts-purple" x="340" y="301" text-anchor="middle" dominant-baseline="central">Transform · model</text>

  <rect x="434" y="258" width="188" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-purple" x="528" y="282" text-anchor="middle" dominant-baseline="central">Great Expectations</text>
  <text class="ts-purple" x="528" y="301" text-anchor="middle" dominant-baseline="central">Data quality checks</text>

  <!-- ═══════ LAYER 4: SERVING ═══════ -->
  <line x1="50" y1="334" x2="670" y2="334" class="divider"/>

  <rect x="58" y="366" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="138" y="390" text-anchor="middle" dominant-baseline="central">NocoDB</text>
  <text class="ts-green" x="138" y="409" text-anchor="middle" dominant-baseline="central">Web DB interface</text>

  <rect x="234" y="366" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="314" y="390" text-anchor="middle" dominant-baseline="central">Metabase</text>
  <text class="ts-green" x="314" y="409" text-anchor="middle" dominant-baseline="central">Internal BI / explore</text>

  <rect x="410" y="366" width="158" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th-green" x="489" y="390" text-anchor="middle" dominant-baseline="central">Adminer</text>
  <text class="ts-green" x="489" y="409" text-anchor="middle" dominant-baseline="central">DB admin (IT only)</text>

  <rect x="58" y="452" width="510" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="313" y="474" text-anchor="middle" dominant-baseline="central">Traefik (Reverse Proxy · SSL · routing · RBAC middleware)</text>

  <!-- ═══════ LAYER 5: REPORTING ═══════ -->
  <line x1="50" y1="516" x2="670" y2="516" class="divider"/>

  <rect x="58" y="548" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="158" y="572" text-anchor="middle" dominant-baseline="central">Power BI Desktop</text>
  <text class="ts-blue" x="158" y="591" text-anchor="middle" dominant-baseline="central">Connect via DirectQuery</text>

  <rect x="274" y="548" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="364" y="572" text-anchor="middle" dominant-baseline="central">Apache Superset</text>
  <text class="ts-blue" x="364" y="591" text-anchor="middle" dominant-baseline="central">FOSS dashboard</text>

  <rect x="470" y="548" width="152" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th-blue" x="546" y="572" text-anchor="middle" dominant-baseline="central">Grafana</text>
  <text class="ts-blue" x="546" y="591" text-anchor="middle" dominant-baseline="central">Ops monitoring</text>

  <!-- ═══════ INFRASTRUCTURE ═══════ -->
  <line x1="50" y1="624" x2="670" y2="624" class="divider"/>

  <rect x="58" y="644" width="610" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th-gray" x="363" y="668" text-anchor="middle" dominant-baseline="central">Docker Engine (WSL2 · Network Mirrored · Windows 11)</text>
  <text class="ts-gray" x="363" y="687" text-anchor="middle" dominant-baseline="central">docker-compose · volumes · internal network · env secrets</text>

  <!-- ═══════ ARROWS ═══════ -->
  <line x1="133" y1="108" x2="133" y2="148" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M210 108 Q210 130 290 148" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M208 108 Q300 120 444 148" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <line x1="147" y1="206" x2="147" y2="256" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M444 195 Q300 230 246 256" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M252 195 Q210 230 200 256" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="246" y1="286" x2="260" y2="286" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M418 286 Q440 240 480 206" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <line x1="147" y1="314" x2="138" y2="364" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M533 206 Q560 360 490 544" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <line x1="313" y1="422" x2="313" y2="450" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="313" y1="496" x2="313" y2="546" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M609 108 Q620 480 570 496" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
